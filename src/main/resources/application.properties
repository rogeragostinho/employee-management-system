management.endpoints.web.exposure.include=mappings

# Configurações do JWT (A chave deve ter pelo menos 256 bits / 32 caracteres)
jwt.secret=your_secret_key_here_change_it_must_be_long_enough_32chars_min
jwt.expiration-time=3600000